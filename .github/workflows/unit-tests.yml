name: unit-tests

on:
  push:
    paths:
      - ".devcontainer/docker-compose.yml"
      - ".devcontainer/servicebus-config.json"
      - "unit-tests/**"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    paths:
      - ".devcontainer/docker-compose.yml"
      - ".devcontainer/servicebus-config.json"
      - "unit-tests/**"
      - ".github/workflows/unit-tests.yml"
  workflow_dispatch:

jobs:
  servicebus-sql-filter-tests:
    name: Service Bus SqlFilter Tests
    runs-on: ubuntu-latest
    env:
      SERVICEBUS_CONNECTION: Endpoint=sb://localhost:5672/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "unit-tests/package-lock.json"

      - name: Install test dependencies
        run: npm ci --prefix unit-tests

      - name: Start Service Bus emulator stack
        run: docker compose -f unit-tests/docker-compose.test.yml up -d

      - name: Wait for Service Bus emulator to be reachable
        run: |
          for i in {1..30}; do
            if timeout 1 bash -c '</dev/tcp/localhost/5672' 2>/dev/null; then
              echo "Service Bus emulator is reachable on localhost:5672"
              exit 0
            fi
            echo "Waiting for emulator startup... ($i/30)"
            sleep 2
          done
          echo "Service Bus emulator did not become reachable in time"
          docker compose -f unit-tests/docker-compose.test.yml logs servicebus-emulator
          exit 1

      - name: Wait for Service Bus emulator AMQP readiness
        run: |
          node <<'NODE'
          const { ServiceBusClient } = require('./unit-tests/node_modules/@azure/service-bus');

          async function wait(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function probe() {
            let client;
            let receiver;

            try {
              client = new ServiceBusClient(process.env.SERVICEBUS_CONNECTION);
              receiver = client.createReceiver('notificationpublisher', 'consumer1');
              await receiver.receiveMessages(1, { maxWaitTimeInMs: 500 });
            } finally {
              if (receiver) {
                await receiver.close().catch(() => {});
              }
              if (client) {
                await client.close().catch(() => {});
              }
            }
          }

          async function main() {
            for (let i = 1; i <= 30; i += 1) {
              try {
                await probe();
                console.log('Service Bus emulator AMQP is ready');
                return;
              } catch (error) {
                const reason = error?.code || error?.name || error?.message || 'unknown error';
                console.log(`AMQP not ready yet (${i}/30): ${reason}`);
                await wait(2000);
              }
            }

            throw new Error('Service Bus emulator AMQP readiness timed out');
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Run integration tests against Service Bus emulator
        run: npm run test:ci --prefix unit-tests

      - name: Dump emulator logs on failure
        if: failure()
        run: docker compose -f unit-tests/docker-compose.test.yml logs servicebus-emulator sqledge

      - name: Stop emulator containers
        if: always()
        run: docker compose -f unit-tests/docker-compose.test.yml down -v
