services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/Fabmedical:cached
    command: /bin/sh -c "while sleep 1000; do :; done"
    depends_on:
      - mongo
      - servicebus-emulator

  mongo:
    image: mongo:4.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Strong!Passw0rd#2024"
    ports:
      - "1433:1433"
    volumes:
      - sqledge-data:/var/opt/mssql

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    restart: unless-stopped
    depends_on:
      sqledge:
        condition: service_started
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "Strong!Passw0rd#2024"
      ACCEPT_EULA: "Y"
      CONFIG_PATH: /ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5672:5672"
      - "5300:5300"
    volumes:
      - ./servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro

volumes:
  mongo-data:
  sqledge-data:
